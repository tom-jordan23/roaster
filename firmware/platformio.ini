; PlatformIO Project Configuration
; Fluid-Bed Coffee Roaster - Real-Time Control Layer
;
; This firmware handles:
;   - Thermocouple acquisition (3x MAX31855 via SPI)
;   - Heater SSR burst-fire control
;   - Blower speed control
;   - Safety interlocks (authoritative)
;   - Serial command/data interface to host (Pi, Artisan, etc.)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries
lib_deps =
    adafruit/Adafruit MAX31855 library@^1.3.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DROASTER_VERSION=\"0.1.0\"

; Unit test configuration
test_framework = unity
test_build_src = yes
