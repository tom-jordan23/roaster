<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 770" width="820" height="770">
  <title>Roaster v1 Assembly — Side Cross-Section (rear at left, front at right)</title>

  <style>
    text { font-family: monospace; font-size: 11px; fill: #222; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 11px; font-weight: bold; }
    .note { font-size: 9px; fill: #555; }
    .dim { font-size: 10px; fill: #666; }
    .component { stroke: #333; stroke-width: 1.2; }
    .frame { fill: #555; stroke: #333; stroke-width: 1; }
    .deck { fill: #d6d6d6; stroke: #555; stroke-width: 1; }
    .ext { fill: #ececec; stroke: #888; stroke-width: 1; stroke-dasharray: 4,2; }
    .leg { stroke: #444; stroke-width: 3; }
    .clamp { fill: #888; stroke: #333; stroke-width: 1; }
    .plenum { fill: #c0d2e6; stroke: #335; stroke-width: 1.4; }
    .heater { fill: #f78a78; stroke: #6a1f17; stroke-width: 1.4; }
    .element { fill: #ff5a2e; }
    .blower { fill: #7fa6e6; stroke: #243a6a; stroke-width: 1.4; }
    .chamber { fill: #d6e7f0; stroke: #2c4a59; stroke-width: 1.2; }
    .chaff { fill: #e2c8ec; stroke: #5b2f6a; stroke-width: 1.2; }
    .cone { fill: #d3dde2; stroke: #455a64; stroke-width: 1.2; }
    .barrier { fill: #aab; stroke: #335; stroke-width: 1; }
    .ebox { fill: #c8eccd; stroke: #2c5d36; stroke-width: 1.2; }
    .gasket { fill: #ffb38a; stroke: #7a3a16; stroke-width: 0.8; }
    .plate { fill: #d2a647; stroke: #5a3e10; stroke-width: 1; }
    .baffle { stroke: #d2691e; stroke-width: 3; fill: none; stroke-linecap: round; }
    .dimline { stroke: #999; stroke-width: 0.6; stroke-dasharray: 4,2; fill: none; }
    .center { stroke: #bbb; stroke-width: 0.4; stroke-dasharray: 8,3,2,3; }
    .cool { stroke: #2a85ff; stroke-width: 1.6; fill: none; marker-end: url(#aBlue); }
    .hot  { stroke: #ff5a2e; stroke-width: 1.6; fill: none; marker-end: url(#aRed); }
    .tc { fill: #d33; }
    .ptap { fill: #6a3aa8; }
  </style>

  <defs>
    <marker id="aBlue" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2a85ff"/>
    </marker>
    <marker id="aRed" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#ff5a2e"/>
    </marker>
  </defs>

  <rect width="820" height="770" fill="#fafafa"/>

  <text x="410" y="22" text-anchor="middle" class="title">
    Roaster v1 Assembly — Side Cross-Section (rear at left, front at right)
  </text>
  <text x="410" y="38" text-anchor="middle" class="note">
    DR-011 motor + DR-012 round plenum + DR-013 tripod legs + 12"×18" deck on extended angle-iron frame
  </text>

  <!-- Mapping: svg_x = 80 + (Y_mm + 152) * 0.85   svg_y = 720 - (Z_mm + 100) * 0.85 -->

  <!-- Floor reference line -->
  <line x1="40" y1="720" x2="780" y2="720" stroke="#bbb" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="50" y="734" class="note">Bench surface (Z = -100 mm: tripod feet)</text>

  <!-- =================================================== -->
  <!-- FRAME and EXTENSIONS                                 -->
  <!-- =================================================== -->

  <!-- Long-edge angle-iron rail (drawn as horizontal bar under the deck) -->
  <rect x="80" y="654" width="654" height="6" class="frame"/>

  <!-- Deck (12"×18" steel sheet, Y=0 to Y=457) -->
  <rect x="209" y="631" width="389" height="4" class="deck"/>
  <text x="403" y="627" text-anchor="middle" class="label">Deck — 12" × 18" steel (BASE-001)</text>

  <!-- Rear extension panel (Y=-152 to Y=0) -->
  <rect x="80" y="631" width="129" height="4" class="ext"/>
  <text x="144" y="697" text-anchor="middle" class="note">Rear angle-iron extension</text>
  <text x="144" y="708" text-anchor="middle" class="note">(motor cradle, ~6")</text>

  <!-- Front extension panel (Y=457 to Y=582) -->
  <rect x="598" y="631" width="129" height="4" class="ext"/>
  <text x="662" y="697" text-anchor="middle" class="note">Front angle-iron extension</text>
  <text x="662" y="708" text-anchor="middle" class="note">(electronics tray, ~5")</text>

  <!-- =================================================== -->
  <!-- TRIPOD LEGS (DR-013)                                 -->
  <!-- =================================================== -->

  <!-- Rear leg (CL at Y=-120 mm), goes from foot (Z=-100) up past chamber band -->
  <line x1="107" y1="720" x2="107" y2="172" class="leg"/>
  <text x="50" y="180" class="note">Rear leg</text>
  <text x="50" y="192" class="note">(threaded</text>
  <text x="50" y="204" class="note">rod, DR-013)</text>

  <!-- Front pair (CL at Y=380 mm) — drawn as one line in side view -->
  <line x1="532" y1="720" x2="532" y2="172" class="leg"/>
  <text x="538" y="180" class="note">Front legs (×2)</text>
  <text x="538" y="192" class="note">(straddle plenum)</text>

  <!-- Chamber-band clamp at the top of legs -->
  <rect x="100" y="166" width="440" height="6" class="clamp"/>
  <text x="320" y="160" text-anchor="middle" class="label">Chamber-band clamp</text>
  <text x="320" y="150" text-anchor="middle" class="note">(captures cone reducer; tripod tip-resistance per DR-013)</text>

  <!-- =================================================== -->
  <!-- BLOWER (BLW-001 — DR-011, measured 152×152)          -->
  <!-- =================================================== -->

  <!-- Body: vertical cylinder, drawn as rectangle in side view -->
  <rect x="80" y="506" width="129" height="129" class="blower"/>
  <text x="144" y="540" text-anchor="middle" class="label" fill="#fff">Blower</text>
  <text x="144" y="554" text-anchor="middle" class="note" fill="#fff">BLW-001</text>
  <text x="144" y="568" text-anchor="middle" class="note" fill="#fff">vacuum motor</text>
  <text x="144" y="582" text-anchor="middle" class="note" fill="#fff">(bypass-cooled)</text>
  <text x="144" y="596" text-anchor="middle" class="note" fill="#fff">152 × 152 mm</text>
  <text x="144" y="612" text-anchor="middle" class="note" fill="#fff">vertical axis</text>

  <!-- Outlet stub (radial, points forward toward heater can, at heater-can Z) -->
  <rect x="207" y="555" width="60" height="32" class="blower"/>
  <text x="216" y="551" class="note">→ flex elbow + clamp</text>

  <!-- Cooling-fan exhaust arrow (down through extension) -->
  <path d="M144,630 L144,668" class="cool"/>
  <text x="150" y="668" class="note">cooling exhaust</text>

  <!-- =================================================== -->
  <!-- HEATER CAN (HTR-CAN-001, 178 mm × 64 mm)             -->
  <!-- =================================================== -->

  <!-- Horizontal cylinder along Y, axis at Z=75 mm -->
  <rect x="230" y="544" width="151" height="54" rx="4" class="heater"/>
  <!-- Element pack inside (1.5"×6" Warrior, measured 2026-05-07) -->
  <rect x="241" y="563" width="129" height="16" class="element"/>
  <text x="305" y="538" text-anchor="middle" class="label" fill="#7a1c10">Heater can — HTR-CAN-001</text>
  <text x="305" y="613" text-anchor="middle" class="note">2.5" SS exhaust pipe × 7" long; element 1.5" × 6"</text>

  <!-- Hose clamp at blower joint -->
  <rect x="221" y="540" width="6" height="62" fill="none" stroke="#444" stroke-width="2"/>
  <!-- Hose clamp at plenum side-entry stub -->
  <rect x="382" y="540" width="6" height="62" fill="none" stroke="#444" stroke-width="2"/>
  <text x="222" y="535" class="note">clamp</text>
  <text x="382" y="535" class="note">clamp</text>

  <!-- TC1 thermocouple (process air) just upstream of plenum side-entry -->
  <line x1="378" y1="555" x2="395" y2="525" stroke="#d33" stroke-width="1"/>
  <circle cx="378" cy="555" r="2.5" class="tc"/>
  <text x="395" y="520" class="label" fill="#d33">TC1</text>
  <text x="395" y="510" class="note" fill="#d33">process air</text>

  <!-- =================================================== -->
  <!-- PLENUM (DR-012: 8" × 6" black stovepipe, vertical)  -->
  <!-- =================================================== -->

  <!-- Plenum body: rect in side view; left edge at Y=228, right at Y=431 -->
  <rect x="403" y="485" width="173" height="129" class="plenum"/>

  <!-- Standoffs under plenum bottom cap (1" gap to deck) -->
  <rect x="425" y="614" width="6" height="21" class="frame"/>
  <rect x="548" y="614" width="6" height="21" class="frame"/>

  <!-- Bottom cap (drawn as a thin rim sticking out below plenum) -->
  <rect x="400" y="612" width="179" height="3" class="plenum"/>

  <!-- Side-entry stub PLEN-005 (joins heater can on rear face of plenum) -->
  <rect x="383" y="557" width="20" height="28" class="plenum"/>

  <!-- Deflector ramp baffle (DR-009) inside plenum, opposite side-entry -->
  <line x1="568" y1="595" x2="552" y2="565" class="baffle"/>
  <text x="572" y="590" class="note" fill="#d2691e">deflector ramp</text>
  <text x="572" y="600" class="note" fill="#d2691e">(DR-009)</text>

  <text x="489" y="525" text-anchor="middle" class="label" fill="#1a3a66">Plenum</text>
  <text x="489" y="540" text-anchor="middle" class="note">8" dia × 6" tall stovepipe (DR-012)</text>
  <text x="489" y="555" text-anchor="middle" class="note">caps top/bottom; plate clamp ring</text>
  <text x="489" y="570" text-anchor="middle" class="note">on cap underside (DR-008)</text>

  <!-- Top cap with chamber hole -->
  <rect x="400" y="481" width="179" height="4" class="plenum"/>
  <!-- Clamping ring beneath top cap face (DR-008 Option A) -->
  <rect x="430" y="478" width="50" height="3" class="clamp"/>
  <rect x="500" y="478" width="50" height="3" class="clamp"/>
  <!-- Gasket -->
  <rect x="425" y="476" width="135" height="2" class="gasket"/>

  <text x="595" y="478" class="note">top cap (drilled to chamber OD)</text>
  <text x="595" y="488" class="note">+ ring + gasket (DR-008)</text>

  <!-- =================================================== -->
  <!-- DISTRIBUTOR PLATE + ROAST CHAMBER                    -->
  <!-- =================================================== -->

  <!-- Distributor plate: thin disc inside chamber bottom -->
  <rect x="466" y="473" width="46" height="3" class="plate"/>
  <text x="385" y="465" class="note">distributor (PLATE-001A)</text>

  <!-- Chamber: vertical tube, sits in cap, rim on ring face -->
  <rect x="462" y="223" width="3" height="252" class="chamber"/>
  <rect x="513" y="223" width="3" height="252" class="chamber"/>
  <text x="489" y="350" text-anchor="middle" class="label" fill="#1a3a59">Chamber</text>
  <text x="489" y="364" text-anchor="middle" class="note">2.5" OD SS exhaust pipe</text>
  <text x="489" y="378" text-anchor="middle" class="note">(CHAM-001A; 12" tall)</text>

  <!-- Bean bed indicator -->
  <rect x="466" y="430" width="46" height="33" fill="#8b4513" fill-opacity="0.3" stroke="#8b4513" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="489" y="450" text-anchor="middle" class="note" fill="#8b4513">bean bed</text>

  <!-- TC2 in lower chamber -->
  <line x1="516" y1="445" x2="535" y2="430" stroke="#d33" stroke-width="1"/>
  <circle cx="516" cy="445" r="2.5" class="tc"/>
  <text x="538" y="430" class="label" fill="#d33">TC2</text>
  <text x="538" y="420" class="note" fill="#d33">bean bed</text>

  <!-- PRESS-001 taps (DR-013 D5): plate dP and bed dP -->
  <line x1="465" y1="478" x2="442" y2="495" stroke="#6a3aa8" stroke-width="0.9"/>
  <circle cx="465" cy="478" r="2" class="ptap"/>
  <line x1="465" y1="465" x2="442" y2="448" stroke="#6a3aa8" stroke-width="0.9"/>
  <circle cx="465" cy="465" r="2" class="ptap"/>
  <text x="380" y="495" class="note" fill="#6a3aa8">PRESS-001 taps (plate dP)</text>

  <!-- =================================================== -->
  <!-- CONE REDUCER + CHAFF COLLECTOR                       -->
  <!-- =================================================== -->

  <polygon points="462,223 516,223 533,180 445,180" class="cone"/>
  <text x="540" y="206" class="note">cone reducer (EXH-004)</text>

  <rect x="445" y="72" width="3" height="108" class="chaff"/>
  <rect x="530" y="72" width="3" height="108" class="chaff"/>
  <rect x="445" y="69" width="88" height="3" class="chaff"/>

  <text x="489" y="125" text-anchor="middle" class="label" fill="#5b2f6a">Chaff collector</text>
  <text x="489" y="138" text-anchor="middle" class="note">4" OD × 5" expansion (DR-006)</text>

  <!-- Mesh screen near top -->
  <line x1="447" y1="80" x2="531" y2="80" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="540" y="83" class="note">30 × 30 SS mesh</text>

  <!-- TC3 in exhaust -->
  <line x1="533" y1="100" x2="555" y2="92" stroke="#d33" stroke-width="1"/>
  <circle cx="533" cy="100" r="2.5" class="tc"/>
  <text x="558" y="92" class="label" fill="#d33">TC3</text>
  <text x="558" y="82" class="note" fill="#d33">exhaust</text>

  <!-- Exhaust out arrow -->
  <path d="M489,69 L489,50" class="hot"/>
  <text x="495" y="50" class="note" fill="#ff5a2e">exhaust out</text>

  <!-- =================================================== -->
  <!-- AIRFLOW ARROWS                                       -->
  <!-- =================================================== -->

  <!-- Ambient into blower (top of motor) -->
  <path d="M144,490 L144,505" class="cool"/>
  <text x="150" y="498" class="note" fill="#2a85ff">ambient in</text>

  <!-- Blower outlet → heater can -->
  <path d="M210,571 L228,571" class="cool"/>

  <!-- Through heater (becomes hot) -->
  <path d="M380,571 L398,571" class="hot"/>

  <!-- Plenum interior: jet down ramp to floor -->
  <path d="M470,575 L470,605" class="hot"/>

  <!-- Up through distributor plate -->
  <path d="M480,475 L480,228" class="hot"/>
  <path d="M495,475 L495,228" class="hot"/>

  <!-- Through cone into chaff collector -->
  <path d="M489,180 L489,80" class="hot"/>

  <!-- =================================================== -->
  <!-- HEAT BARRIER + ELECTRONICS BOX                       -->
  <!-- =================================================== -->

  <rect x="595" y="465" width="3" height="170" class="barrier"/>
  <text x="600" y="455" class="note">heat barrier</text>
  <text x="600" y="445" class="note">(grommeted SSR + TC)</text>

  <rect x="609" y="558" width="85" height="77" class="ebox"/>
  <text x="652" y="585" text-anchor="middle" class="label" fill="#234d2c">Electronics tray</text>
  <text x="652" y="599" text-anchor="middle" class="note">ESP32 + MAX31855 ×3</text>
  <text x="652" y="611" text-anchor="middle" class="note">+ SSR drive buffer</text>
  <text x="652" y="623" text-anchor="middle" class="note">+ CT bias network</text>

  <!-- =================================================== -->
  <!-- DIMENSION CALLOUTS                                   -->
  <!-- =================================================== -->

  <!-- Total assembly height -->
  <line x1="765" y1="50"  x2="765" y2="635" class="dimline"/>
  <line x1="755" y1="50"  x2="775" y2="50"  class="dimline"/>
  <line x1="755" y1="635" x2="775" y2="635" class="dimline"/>
  <text x="780" y="345" class="dim" transform="rotate(90,780,345)">~ 23" total height</text>

  <!-- Frame total length -->
  <line x1="80"  y1="745" x2="734" y2="745" class="dimline"/>
  <line x1="80"  y1="740" x2="80"  y2="755" class="dimline"/>
  <line x1="734" y1="740" x2="734" y2="755" class="dimline"/>
  <text x="407" y="760" text-anchor="middle" class="dim">~ 29" frame length (rear ext + 18" deck + front ext)</text>

  <!-- Deck length -->
  <line x1="209" y1="678" x2="598" y2="678" class="dimline"/>
  <line x1="209" y1="673" x2="209" y2="685" class="dimline"/>
  <line x1="598" y1="673" x2="598" y2="685" class="dimline"/>
  <text x="403" y="691" text-anchor="middle" class="dim">18" steel deck</text>

  <!-- Legend -->
  <rect x="40" y="265" width="170" height="80" fill="white" stroke="#ccc"/>
  <text x="50" y="280" class="label">Legend</text>
  <line x1="50" y1="294" x2="76" y2="294" stroke="#2a85ff" stroke-width="2"/>
  <text x="80" y="298" class="note">cool airflow</text>
  <line x1="50" y1="308" x2="76" y2="308" stroke="#ff5a2e" stroke-width="2"/>
  <text x="80" y="312" class="note">hot airflow</text>
  <circle cx="56" cy="324" r="3" class="tc"/>
  <text x="64" y="328" class="note">thermocouple (TC1/2/3)</text>
  <circle cx="56" cy="338" r="3" class="ptap"/>
  <text x="64" y="342" class="note">pressure tap (PRESS-001)</text>
</svg>
