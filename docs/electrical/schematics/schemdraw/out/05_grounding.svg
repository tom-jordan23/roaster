ine="central" fill="black" font-size="9" font-family="sans" text-anchor="start"><tspan x="118.80000000000001" dy="9">SSR-001 heatsink</tspan><tspan x="118.80000000000001" dy="9">(if metal)</tspan></text><text x="118.80000000000001" y="375.3" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="start"><tspan x="118.80000000000001" dy="9">Blower motor frame</tspan><tspan x="118.80000000000001" dy="9">(BOND-001 - DR-011)</tspan></text><text x="-50.4" y="283.59999999999997" dominant-baseline="hanging" fill="#666666" font-size="8" font-family="sans" text-anchor="middle"><tspan x="-50.4" dy="8">Star ground:</tspan><tspan x="-50.4" dy="8">all PE returns</tspan><tspan x="-50.4" dy="8">bond at the stud,</tspan><tspan x="-50.4" dy="8">not daisy-chained</tspan></text><text x="507.59999999999997" y="46.8" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="middle"><tspan x="507.59999999999997" dy="9">PSU-001</tspan><tspan x="507.59999999999997" dy="9">5 V / 2 A USB charger</tspan><tspan x="507.59999999999997" dy="9">(isolated SMPS)</tspan></text><text x="622.8000000000001" y="149.4" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="start"><tspan x="622.8000000000001" dy="9">ESP32 GND</tspan></text><text x="622.8000000000001" y="202.5" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="start"><tspan x="622.8000000000001" dy="9">TRIAC dimmer</tspan><tspan x="622.8000000000001" dy="9">logic GND</tspan></text><text x="622.8000000000001" y="260.1" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="start"><tspan x="622.8000000000001" dy="9">CT-001 burden</tspan><tspan x="622.8000000000001" dy="9">+ bias return</tspan></text><text x="622.8000000000001" y="317.70000000000005" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="start"><tspan x="622.8000000000001" dy="9">MAX31855 GND</tspan><tspan x="622.8000000000001" dy="9">(via SPI cable shield drain - one end)</tspan></text><text x="320.40000000000003" y="88.0" dominant-baseline="central" fill="#1f9d3a" font-size="8" font-family="sans" text-anchor="end"><tspan x="320.40000000000003" dy="8">PE in</tspan><tspan x="320.40000000000003" dy="8">(green wire</tspan><tspan x="320.40000000000003" dy="8">to PSU</tspan><tspan x="320.40000000000003" dy="8">chassis pin)</tspan></text><text x="507.59999999999997" y="368.40000000000003" dominant-baseline="central" fill="#666666" font-size="8" font-family="sans" text-anchor="middle"><tspan x="507.59999999999997" dy="8">Single PE &lt;-&gt; signal-GND tie inside PSU-001</tspan><tspan x="507.59999999999997" dy="8">(internal Y-cap or earth-bond resistor).</tspan><tspan x="507.59999999999997" dy="8">Do NOT add a second chassis-to-signal-GND wire</tspan><tspan x="507.59999999999997" dy="8">anywhere else - that would create a ground loop</tspan><tspan x="507.59999999999997" dy="8">and inject motor/SSR noise into the SPI bus.</tspan></text><text x="219.6" y="477.9000000000001" dominant-baseline="central" fill="black" font-size="9" font-family="sans" text-anchor="middle"><tspan x="219.6" dy="9">Grounding Plan - Two Stars, One Tie</tspan><tspan x="219.6" dy="9">Left: chassis (PE) star at the ground stud, all metal parts bond here.</tspan><tspan x="219.6" dy="9">Right: signal (0 V) star at PSU-001 0 V output, all logic returns bond here.</tspan><tspan x="219.6" dy="9">The two stars are tied at exactly one point - inside PSU-001.</tspan></text><text x="255.6" y="-29.4" dominant-baseline="central" fill="#888888" font-size="10" font-family="sans" text-anchor="middle"><tspan x="255.6" dy="10">ISOLATION BARRIER</tspan><tspan x="255.6" dy="10">(PSU-001)</tspan></text><circle cx="0.0" cy="-0.0" r="2.6999999999999997" style="stroke:black;fill:white;stroke-width:2.0;stroke-dasharray:-;" /><text x="-6.3" y="-15.0" dominant-baseline="central" fill="black" font-size="10" font-family="sans" text-anchor="end"><tspan x="-6.3" dy="10">Mains Earth</tspan><tspan x="-6.3" dy="10">(cord G, green)</tspan></text><circle cx="0.0" cy="108.0" r="2.6999999999999997" style="stroke:black;fill:black;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="108.0" cy="162.0" r="2.6999999999999997" style="stroke:#1f9d3a;fill:#1f9d3a;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="108.0" cy="219.6" r="2.6999999999999997" style="stroke:#1f9d3a;fill:#1f9d3a;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="108.0" cy="277.2" r="2.6999999999999997" style="stroke:#1f9d3a;fill:#1f9d3a;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="108.0" cy="334.8" r="2.6999999999999997" style="stroke:#1f9d3a;fill:#1f9d3a;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="108.0" cy="392.40000000000003" r="2.6999999999999997" style="stroke:#1f9d3a;fill:#1f9d3a;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="504.0" cy="108.0" r="2.6999999999999997" style="stroke:black;fill:black;stroke-width:2.0;stroke-dasharray:-;" /><text x="497.7" y="100.0" dominant-baseline="central" fill="black" font-size="8" font-family="sans" text-anchor="end"><tspan x="497.7" dy="8">0 V out</tspan></text><circle cx="612.0" cy="162.0" r="2.6999999999999997" style="stroke:#000000;fill:#000000;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="612.0" cy="219.6" r="2.6999999999999997" style="stroke:#000000;fill:#000000;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="612.0" cy="277.2" r="2.6999999999999997" style="stroke:#000000;fill:#000000;stroke-width:2.0;stroke-dasharray:-;" /><circle cx="612.0" cy="334.8" r="2.6999999999999997" style="stroke:#000000;fill:#000000;stroke-width:2.0;stroke-dasharray:-;" /></svg>